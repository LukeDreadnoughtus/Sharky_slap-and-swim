<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <meta name="theme-color" content="#001018">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
   <script src="sharki/models/drawable-object.class.js"></script>
  <script src="sharki/models/movable-objects.class.js"></script>
  
     <script src="sharki/models/character.class.js"></script>
       
      <script src="sharki/models/enemy.class.js"></script>
      <script src="sharki/models/status-bar.class.js"></script>
      <script src="sharki/models/coin-status-bar.class.js"></script>
      <script src="sharki/models/poison-status-bar.class.js"></script>
      <script src="sharki/models/coin.class.js"></script>
      <script src="sharki/models/poison-bubble.class.js"></script>
      
        <script src="sharki/models/world.class.js"></script>
        <script src="sharki/models/water.class.js"></script>
         <script src="sharki/models/background-object.class.js"></script>
          
         <script src="sharki/models/keyboard.class.js"></script>
         
         <script src="sharki/models/level.class.js"></script>
         <script src="sharki/models/endboss.class.js"></script>
         <script src="sharki/models/boss-trigger.class.js"></script>
              <script src="sharki/models/throwable-object.class.js"></script>
         <script src="sharki/levels/level-utils.js"></script>
         <script src="sharki/levels/level1.js"></script>
         <script src="sharki/levels/level2.js"></script>
         <script src="sharki/levels/level3.js"></script>
   
   <script src="sharki/js/game.js"></script>
    
 


</head>
<body>
    <h1>Sharki</h1>

    <div class="game-wrapper">
        <div id="startscreen" class="startscreen">
            <img src="sharki/img/6.Botones/Tittles/Titel Screen.png" alt="Titelbildschirm" class="startscreen__image">
            <div class="startscreen__buttons">
                <button id="startBtn" class="menu-button" type="button">Start</button>
                <button id="keyBtn" class="menu-button menu-button--secondary" type="button">Key</button>
            </div>
        </div>

        <div id="keyOverlay" class="key-overlay hidden">
            <div class="key-overlay__backdrop"></div>
            <div class="key-overlay__dialog">
                <img src="sharki/img/6.Botones/Key/Steuerung.png" alt="Steuerung" class="key-overlay__image">
            </div>
        </div>


        <button id="settingsBtn" class="settings-button hidden" type="button" aria-label="Einstellungen öffnen">
            <span class="settings-button__icon">⚙</span>
        </button>

        <button id="fullscreenBtn" class="fullscreen-button" type="button" aria-label="Vollbild umschalten" title="Vollbild umschalten">
            <img
                id="fullscreenIcon"
                class="fullscreen-button__image"
                src="sharki/img/6.Botones/Full Screen/Mesa de trabajo 6.png"
                alt="Vollbild"
            >
        </button>

        <div id="pauseOverlay" class="pause-overlay hidden">
            <div class="pause-overlay__backdrop"></div>
            <div class="pause-overlay__dialog">
                <h2 class="pause-overlay__title">Pause</h2>
                <div class="pause-overlay__actions">
                    <button id="closePauseBtn" class="menu-button" type="button">Schließen</button>
                    <button id="muteBtn" class="menu-button menu-button--secondary" type="button">Mute</button>
                    <button id="restartBtn" class="menu-button" type="button">Restart</button>
                    <button id="leaveBtn" class="menu-button menu-button--secondary" type="button">Leave</button>
                </div>
            </div>
        </div>

        <div id="resultOverlay" class="pause-overlay hidden">
            <div class="pause-overlay__backdrop"></div>
            <div class="pause-overlay__dialog">
                <h2 id="resultTitle" class="pause-overlay__title">Level beendet</h2>
                <p id="resultText" class="result-overlay__text"></p>
                <div class="pause-overlay__actions">
                    <button id="tryAgainBtn" class="menu-button hidden" type="button">Try again</button>
                    <button id="nextLevelBtn" class="menu-button hidden" type="button">Next LvL</button>
                    <button id="leaveGameBtn" class="menu-button menu-button--secondary hidden" type="button">Leave</button>
                </div>
            </div>
        </div>

        <div id="touchControls" class="touch-controls hidden" aria-hidden="true">
            <div class="touch-controls__cluster touch-controls__cluster--left">
                <button class="touch-button" type="button" data-key="LEFT" aria-label="Move left">◀</button>
                <button class="touch-button" type="button" data-key="RIGHT" aria-label="Move right">▶</button>
            </div>
            <button class="touch-button touch-button--fullscreen touch-button--icon" id="mobileFullscreenBtn" type="button" aria-label="Vollbild umschalten">⛶</button>
            <div class="touch-controls__cluster touch-controls__cluster--right">
                <button class="touch-button touch-button--wide" type="button" data-key="SPACE" aria-label="Slap">Slap</button>
                <div class="touch-controls__row">
                    <button class="touch-button" type="button" data-key="S" aria-label="Bubble">S</button>
                    <button class="touch-button" type="button" data-key="D" aria-label="Poison bubble">D</button>
                </div>
            </div>
        </div>

        <canvas id="canvas" width="820" height="480"></canvas>
    </div>
 
    <div id="orientationOverlay" class="orientation-overlay hidden" aria-live="polite">
        <div class="orientation-overlay__backdrop"></div>
        <div class="orientation-overlay__dialog">
            <h2 class="orientation-overlay__title">Turn your device to play</h2>
            <p class="orientation-overlay__text">This game works on desktop and on mobile only in landscape mode.</p>
        </div>
    </div>
 
</body>
</html>
